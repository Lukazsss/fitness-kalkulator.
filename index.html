<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Kalkulačka – Tréninkový deník</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styly aplikace -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════════════════════════════════════
     HEADER
══════════════════════════════════════════════ -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
      <circle cx="11" cy="11" r="10" stroke="#f97316" stroke-width="1.5"/>
      <path d="M7 11l3 3 5-5" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    FITNESS<span>KAL</span>KULAČKA
  </div>
  <span class="header-sub">Tréninkový deník</span>
</header>

<!-- ══════════════════════════════════════════════
     HLAVNÍ LAYOUT (dvousloupcový grid)
══════════════════════════════════════════════ -->
<div class="container">

  <!-- ── LEVÝ PANEL: Formulář pro zadání aktivity ── -->
  <div class="panel">
    <div class="panel-header">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="6" stroke="#f97316" stroke-width="1.2"/>
        <path d="M7 4v3l2 1.5" stroke="#f97316" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span class="panel-title">Přidat aktivitu</span>
    </div>
    <div class="panel-body">

      <!-- Přepínač typ: Kardio / Silová -->
      <div class="type-toggle" role="group" aria-label="Typ aktivity">
        <button class="type-btn active-kardio"
                id="btn-kardio"
                onclick="setTyp('kardio')"
                aria-pressed="true">
          <!-- Ikona pulzu (kardio) -->
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M2 7c0-2 1.5-4 3-4s2 2 4 2 3-2 3-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M2 10l2.5-2 2 3 2-5 2 3 1.5-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Kardio
        </button>
        <button class="type-btn"
                id="btn-silova"
                onclick="setTyp('silova')"
                aria-pressed="false">
          <!-- Ikona činek (silová) -->
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <rect x="1" y="6" width="2" height="2" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="11" y="6" width="2" height="2" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="3.5" y="5" width="2" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <rect x="8.5" y="5" width="2" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="5.5" y1="7" x2="8.5" y2="7" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          Silová
        </button>
      </div>

      <!-- Výběr aktivity z číselníku -->
      <div class="form-group">
        <label for="sel-aktivita">Aktivita</label>
        <select id="sel-aktivita"></select>
      </div>

      <!-- Trvání + hmotnost (společné pro oba typy) -->
      <div class="row2">
        <div class="form-group">
          <label for="inp-trvani">Trvání (min)</label>
          <input type="number" id="inp-trvani"
                 min="1" max="600" value="30" placeholder="30">
        </div>
        <div class="form-group" id="grp-vaha">
          <label for="inp-vaha">Hmotnost (kg)</label>
          <input type="number" id="inp-vaha"
                 min="20" max="300" value="75" placeholder="75">
        </div>
      </div>

      <!-- Pole specifická pro KARDIO aktivity -->
      <div class="fields-kardio active" id="fields-kardio">
        <div class="row2">
          <div class="form-group">
            <label for="inp-vzdalenost">Vzdálenost (km)</label>
            <input type="number" id="inp-vzdalenost"
                   min="0" step="0.1" value="5" placeholder="5">
          </div>
          <div class="form-group">
            <label for="inp-rychlost">Rychlost (km/h)</label>
            <input type="number" id="inp-rychlost"
                   min="0" step="0.5" value="10" placeholder="10">
          </div>
        </div>
      </div>

      <!-- Pole specifická pro SILOVÉ aktivity -->
      <div class="fields-silova" id="fields-silova">
        <div class="row2">
          <div class="form-group">
            <label for="inp-serie">Počet sérií</label>
            <input type="number" id="inp-serie"
                   min="1" max="100" value="3" placeholder="3">
          </div>
          <div class="form-group">
            <label for="inp-opakovani">Opakování</label>
            <input type="number" id="inp-opakovani"
                   min="1" max="100" value="10" placeholder="10">
          </div>
        </div>
        <div class="form-group">
          <label for="inp-zatez">Zátěž (kg)</label>
          <input type="number" id="inp-zatez"
                 min="1" max="500" value="60" placeholder="60">
        </div>
      </div>

      <!-- Chybová zpráva (skrytá, zobrazena JS při validaci) -->
      <p class="error-msg" id="err-msg" role="alert">
        Zkontroluj zadané hodnoty.
      </p>

      <!-- Tlačítko přidat – volá pridatAktivitu() z app.js -->
      <button class="btn-add" onclick="pridatAktivitu()">
        + Přidat aktivitu
      </button>

    </div><!-- /.panel-body -->
  </div><!-- /.panel (levý) -->


  <!-- ── PRAVÝ SLOUPEC: Souhrn + seznam aktivit ── -->
  <div>

    <!-- Souhrnné karty – hodnoty aktualizuje JS funkcí prekresliSeznam() -->
    <div class="summary-grid" role="region" aria-label="Denní statistiky">
      <div class="stat-card">
        <div class="stat-label">Celkem kcal</div>
        <div class="stat-value accent" id="stat-kcal">0</div>
        <div class="stat-unit">kilokalorií</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Celkem čas</div>
        <div class="stat-value" id="stat-cas">0</div>
        <div class="stat-unit">minut</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Aktivity</div>
        <div class="stat-value" id="stat-pocet">0</div>
        <div class="stat-unit">záznamů</div>
      </div>
    </div>

    <!-- Panel se seznamem aktivit -->
    <div class="panel">
      <div class="panel-header">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="1.5" y="2.5" width="11" height="9" rx="1.5" stroke="#9a9b9f" stroke-width="1.2"/>
          <line x1="4" y1="5.5" x2="10" y2="5.5" stroke="#9a9b9f" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4" y1="7.5" x2="8" y2="7.5" stroke="#9a9b9f" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="panel-title">Denní přehled</span>
        <!-- Počet aktivit – zobrazí JS -->
        <span id="badge-count"
              style="margin-left:auto; background:var(--bg4); color:var(--text3);
                     font-size:11px; font-weight:600; padding:2px 8px;
                     border-radius:20px; display:none;">
        </span>
      </div>

      <div class="panel-body" style="padding: 12px;">
        <!-- Seznam aktivit – naplňuje JS funkcí prekresliSeznam() -->
        <div id="activity-list" class="activity-list" role="list">
          <!-- Prázdný stav (výchozí) -->
          <div class="empty-state">
            <div class="empty-icon" aria-hidden="true">
              <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="18" r="16" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 18h6v-6" stroke="currentColor" stroke-width="1.5"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="empty-text">
              Zatím žádné aktivity.<br>Přidej první záznam vlevo.
            </div>
          </div>
        </div>

        <!-- Motivační banner – zobrazí JS po přidání aktivity -->
        <div class="motivation" id="motivation" role="status" aria-live="polite"></div>
      </div>
    </div><!-- /.panel (přehled) -->

  </div><!-- /pravý sloupec -->

</div><!-- /.container -->

<!-- Toast notifikace (chybové hlášky) -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<!-- Logika aplikace (OOP třídy + DOM obsluha) -->
<script src="js/app.js"></script>

</body>
</html>
